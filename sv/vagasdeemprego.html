    <!-- Estilos Específicos -->
    <style>
*, *::before, *::after { box-sizing: border-box; }

        /* Card Container */
        .job-card-wrapper {
            position: relative;
            border-radius: 14px;
            border: 1px solid rgba(26, 62, 116, 0.1);
            background-color: white;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .job-card-wrapper:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(26, 62, 116, 0.12);
            border-color: rgba(26, 62, 116, 0.3);
        }

        /* Checkbox Customizado (HTML Puro + CSS) */
        .card-checkbox-label {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 20;
            /* Acima do link */
            cursor: pointer;
            width: 24px;
            height: 24px;
        }

        .card-checkbox-input {
            display: none;
            /* Esconde o checkbox nativo */
        }

        .card-checkbox-custom {
            width: 100%;
            height: 100%;
            background-color: #f3f4f6;
            border: 2px solid #d1d5db;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        /* Estado Marcado */
        .card-checkbox-input:checked+.card-checkbox-custom {
            background-color: #1a3e74;
            border-color: #1a3e74;
        }

        /* Ícone de Check */
        .card-checkbox-icon {
            color: white;
            font-size: 14px;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-checkbox-input:checked+.card-checkbox-custom .card-checkbox-icon {
            opacity: 1;
            transform: scale(1);
        }

        /* Link que cobre o card (exceto o checkbox) */
        .job-card-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 1.5rem 1rem 1rem 1rem;
            text-decoration: none;
            color: inherit;
            flex-grow: 1;
        }

        .job-card-link i {
            color: #1A3E74;
            transition: transform 0.2s ease;
        }

        .job-card-wrapper:hover .job-card-link i {
            transform: scale(1.1);
            color: #2563eb;
        }

        /* Grade Responsiva */
        .jobs-grid {
            display: grid;
            grid-template-columns: repeat(1, minmax(0, 1fr));
            gap: 1rem;
        }

        @media (min-width: 640px) {
            .jobs-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (min-width: 768px) {
            .jobs-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (min-width: 1024px) {
            .jobs-grid {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }
        }

        @media (min-width: 1280px) {
            .jobs-grid {
                grid-template-columns: repeat(5, minmax(0, 1fr));
            }
        }
    </style>
