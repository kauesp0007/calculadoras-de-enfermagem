<script>
fetch("/footer.html")
.then((response) => response.text())
.then((data) => {
document.getElementById("footer-placeholder").innerHTML = data;
if (typeof carregarTraducoes === "function") {
carregarTraducoes("pt", "footer.json");
carregarTraducoes("pt", "cookies.json");
}
});

// Nova Lógica de Filtros (Estilo Google)
const buttons = document.querySelectorAll(".filter-btn");
buttons.forEach((btn) => {
btn.addEventListener("click", () => {
// Remove active state de todos
buttons.forEach((b) => {
b.classList.remove("text-[#1A3E74]", "font-bold", "border-[#1A3E74]", "active");
b.classList.add("text-gray-500", "font-medium", "border-transparent");
});
// Adiciona active no clicado
btn.classList.remove("text-gray-500", "font-medium", "border-transparent");
btn.classList.add("text-[#1A3E74]", "font-bold", "border-[#1A3E74]", "active");

const filter = btn.getAttribute("data-filter");
["todos", "documentos", "fotos", "videos"].forEach((cat) => {
const grid = document.getElementById(`grid-${cat}`);
if (grid) grid.classList.toggle("hidden", cat !== filter);
});
});
});

// Lightbox Lógica
let bibliotecaGlobal = [];
let currentGlobalIndex = -1;

fetch("/biblioteca.json")
.then((res) => res.json())
.then((data) => {
bibliotecaGlobal = data;
})
.catch((err) => console.error("Erro ao carregar acervo.", err));

function slugifyJs(text) {
return String(text || "")
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g, "")
.replace(/[^a-z0-9]+/g, "-")
.replace(/(^-|-$)/g, "");
}

function updateLightboxUI() {
if (currentGlobalIndex === -1 || bibliotecaGlobal.length === 0) return;
const item = bibliotecaGlobal[currentGlobalIndex];
let imagePath = item.capa || item.ficheiro || "";
if (imagePath && !imagePath.startsWith("/")) imagePath = "/" + imagePath;
const title = item.titulo || "Arquivo sem título";
const slug = item.slug || slugifyJs(title);
const pageUrl = `/biblioteca/${slug}.html`;
const desc = item.descricao && item.descricao.trim() !== "" ? item.descricao : `Download do material sobre ${title} na nossa Biblioteca.`;
const categoria = String(item.categoria || item.tipo || "")
.toLowerCase()
.trim();
const isVideo = categoria === "videos" || categoria === "vídeos" || imagePath.match(/\.(mp4|webm|mov)$/i);

const img = document.getElementById("lightbox-img");
const video = document.getElementById("lightbox-video");
const playBtn = document.getElementById("lightbox-play-btn");

img.src = imagePath;
img.classList.remove("hidden");
video.pause();
video.src = "";
video.classList.add("hidden");
if (isVideo) playBtn.classList.remove("hidden");
else playBtn.classList.add("hidden");

document.getElementById("lightbox-title").textContent = title;
document.getElementById("lightbox-download").href = imagePath;
document.getElementById("lightbox-page-link").href = pageUrl;
document.getElementById("lightbox-desc").textContent = desc;

document.getElementById("lightbox-prev").classList.toggle("hidden", currentGlobalIndex <= 0);
document.getElementById("lightbox-next").classList.toggle("hidden", currentGlobalIndex >= bibliotecaGlobal.length - 1);
}

document.getElementById("lightbox-play-btn").addEventListener("click", () => {
if (currentGlobalIndex === -1 || bibliotecaGlobal.length === 0) return;
let videoPath = bibliotecaGlobal[currentGlobalIndex].ficheiro || "";
if (videoPath && !videoPath.startsWith("/")) videoPath = "/" + videoPath;
document.getElementById("lightbox-img").classList.add("hidden");
document.getElementById("lightbox-play-btn").classList.add("hidden");
const video = document.getElementById("lightbox-video");
video.src = videoPath;
video.classList.remove("hidden");
video.play();
});

document.body.addEventListener("click", (e) => {
const card = e.target.closest(".file-card");
if (!card || bibliotecaGlobal.length === 0) return;
e.preventDefault();
const slugFromCard = card.dataset.slug || card.getAttribute("href").split("/").pop().replace(".html", "");
if (!slugFromCard) return;
const foundIndex = bibliotecaGlobal.findIndex((item) => (item.slug || slugifyJs(item.titulo)) === slugFromCard);
if (foundIndex === -1) return;

currentGlobalIndex = foundIndex;
updateLightboxUI();
const lightbox = document.getElementById("global-lightbox");
lightbox.classList.remove("hidden");
document.body.style.overflow = "hidden";
setTimeout(() => {
lightbox.classList.remove("opacity-0");
lightbox.classList.add("opacity-100");
}, 10);
});

document.getElementById("lightbox-prev").addEventListener("click", (e) => {
e.stopPropagation();
if (currentGlobalIndex > 0) {
currentGlobalIndex--;
updateLightboxUI();
}
});
document.getElementById("lightbox-next").addEventListener("click", (e) => {
e.stopPropagation();
if (currentGlobalIndex < bibliotecaGlobal.length - 1) {
currentGlobalIndex++;
updateLightboxUI();
}
});

function fecharLightbox() {
const lightbox = document.getElementById("global-lightbox");
document.getElementById("lightbox-video").pause();
lightbox.classList.remove("opacity-100");
lightbox.classList.add("opacity-0");
setTimeout(() => {
lightbox.classList.add("hidden");
document.body.style.overflow = "";
document.getElementById("lightbox-img").src = "";
}, 300);
}

document.addEventListener("keydown", (e) => {
if (!document.getElementById("global-lightbox").classList.contains("hidden")) {
if (e.key === "Escape") fecharLightbox();
else if (e.key === "ArrowLeft" && currentGlobalIndex > 0) {
currentGlobalIndex--;
updateLightboxUI();
} else if (e.key === "ArrowRight" && currentGlobalIndex < bibliotecaGlobal.length - 1) {
currentGlobalIndex++;
updateLightboxUI();
}
}
});
</script>
