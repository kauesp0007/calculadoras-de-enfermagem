  <body class="bg-[#F4F7FB] font-sans antialiased text-[#333333] flex flex-col min-h-screen">

    <main class="flex-grow container mx-auto px-4 py-8 max-w-screen-2xl">
      <!-- Início do Hero Card -->
      <div class="relative overflow-hidden shadow-inner rounded-xl p-6 md:p-8 bg-[#1A3E74] flex flex-col md:flex-row items-center justify-between mb-8">
        <div class="absolute top-0 right-0 w-24 h-24 bg-white opacity-5 blur-xl rounded-full"></div>

        <div class="relative z-10 w-full text-left">
          <p class="text-sm font-medium uppercase tracking-wider text-blue-100 mb-2">Acervo Digital</p>
          <h1 class="text-3xl md:text-5xl font-black text-white tracking-tight mb-2">Biblioteca de Enfermagem</h1>
          <p class="text-sm text-blue-200 opacity-90 max-w-2xl">Material completo de documentos, manuais, escalas, protocolos e anotações de enfermagem. Faça o download e aproveite o nosso acervo educacional gratuito.</p>
        </div>

        <div class="hidden md:flex relative z-10 items-center justify-center w-24 h-24 bg-white/10 rounded-full border border-white/20 backdrop-blur-sm shrink-0 ml-6">
          <i class="fa-solid fa-user-nurse text-4xl text-white opacity-80"></i>
        </div>
      </div>

      <!-- Filtros estilo Google (Alinhados à esquerda, apenas texto e linha inferior) -->
      <div class="mb-6 border-b border-gray-200 pt-2">
        <div class="flex flex-wrap gap-6 md:gap-8 justify-start px-2" id="filter-buttons">
          <button class="filter-btn active text-[#1A3E74] font-bold text-sm transition-all bg-transparent px-0 pb-3 border-b-4 border-[#1A3E74] shadow-none cursor-pointer" data-filter="todos">Todos</button>
          <button class="filter-btn text-gray-500 hover:text-[#1A3E74] font-medium text-sm transition-all bg-transparent px-0 pb-3 border-b-4 border-transparent hover:border-gray-300 shadow-none cursor-pointer" data-filter="documentos">Documentos / PDF</button>
          <button class="filter-btn text-gray-500 hover:text-[#1A3E74] font-medium text-sm transition-all bg-transparent px-0 pb-3 border-b-4 border-transparent hover:border-gray-300 shadow-none cursor-pointer" data-filter="fotos">Fotos / Imagens</button>
          <button class="filter-btn text-gray-500 hover:text-[#1A3E74] font-medium text-sm transition-all bg-transparent px-0 pb-3 border-b-4 border-transparent hover:border-gray-300 shadow-none cursor-pointer" data-filter="videos">Vídeos</button>
        </div>
      </div>

      <!-- Grids de Exibição (6 imagens por linha em telas grandes) -->

        <!-- TODOS -->

      <div id="grid-documentos" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4 hidden">
        <!-- DOCUMENTOS -->
      </div>

      <div id="grid-fotos" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4 hidden">
        <!-- FOTOS -->
      </div>

      <div id="grid-videos" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4 hidden">
        <!-- VIDEOS -->

      <div class="mt-12 flex justify-center">
        <!-- PAGINATION -->

    <script src="/global-scripts.js" defer=""></script>

    <!-- Modal / Lightbox Otimizado -->
    <div id="global-lightbox" class="fixed inset-0 hidden opacity-0 transition-opacity duration-300" style="z-index: 999999; background-color: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); overflow-y: auto; -webkit-overflow-scrolling: touch">
      <button id="lightbox-close" onclick="fecharLightbox()" class="flex items-center justify-center w-12 h-12 md:w-14 md:h-14 rounded-full text-white cursor-pointer transition-transform hover:scale-110" style="position: fixed; top: 1.5rem; right: 1.5rem; z-index: 1000000; background: rgba(37, 99, 235, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4)" title="Fechar">
        <i class="fa-solid fa-xmark text-2xl"></i>
      </button>

      <button id="lightbox-prev" class="flex items-center justify-center w-12 h-12 md:w-16 md:h-16 rounded-full text-white hidden cursor-pointer transition-transform hover:scale-110" style="position: fixed; left: 1rem; top: 50%; transform: translateY(-50%); z-index: 1000000; background: rgba(37, 99, 235, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4)" title="Anterior">
        <i class="fa-solid fa-chevron-left text-2xl md:text-3xl"></i>
      </button>

      <button id="lightbox-next" class="flex items-center justify-center w-12 h-12 md:w-16 md:h-16 rounded-full text-white hidden cursor-pointer transition-transform hover:scale-110" style="position: fixed; right: 1rem; top: 50%; transform: translateY(-50%); z-index: 1000000; background: rgba(37, 99, 235, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4)" title="Próximo">
        <i class="fa-solid fa-chevron-right text-2xl md:text-3xl"></i>
      </button>

      <div class="min-h-screen flex items-start justify-center p-4 py-20 md:py-24 w-full relative">
        <div class="w-full max-w-6xl bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row relative mt-8 md:mt-0 my-auto" style="z-index: 999995">
          <div class="w-full md:w-1/2 bg-gray-50 flex items-center justify-center p-4 md:p-8 border-b md:border-b-0 md:border-r border-gray-200 relative">
            <img id="lightbox-img" class="max-w-full h-auto max-h-[50vh] md:max-h-[70vh] object-contain rounded-lg shadow-md" src="" alt="" />
            <video id="lightbox-video" class="hidden max-w-full h-auto max-h-[50vh] md:max-h-[70vh] rounded-lg shadow-md" controls preload="metadata"></video>
            <button id="lightbox-play-btn" class="hidden absolute flex items-center justify-center w-20 h-20 rounded-full bg-black/60 text-white hover:scale-110 transition" title="Reproduzir vídeo">
              <i class="fa-solid fa-play text-3xl"></i>
            </button>
          </div>
          <div class="w-full md:w-1/2 p-6 md:p-10 flex flex-col justify-center bg-white">
            <h3 id="lightbox-title" class="text-2xl md:text-3xl font-black text-[#1A3E74] mb-4 leading-tight"></h3>
            <p id="lightbox-desc" class="text-gray-600 mb-8 leading-relaxed"></p>
            <div class="flex flex-col gap-4">
              <a id="lightbox-download" href="#" download class="flex items-center justify-center gap-3 bg-[#4A90E2] hover:bg-[#357ABD] text-white font-bold py-4 px-6 rounded-xl shadow-[0_4px_15px_rgba(74,144,226,0.4)] transition-transform hover:scale-105">
                <i class="fa-solid fa-cloud-arrow-down text-xl"></i>
                Fazer Download
              </a>
              <a id="lightbox-page-link" href="#" class="flex items-center justify-center gap-3 bg-white hover:bg-gray-50 text-[#1A3E74] font-bold py-3 px-6 rounded-xl border border-gray-200 shadow-sm transition-all hover:border-[#1A3E74]">
                <i class="fa-regular fa-file-lines text-xl"></i>
                Ver Detalhes do Arquivo
              </a>
            </div>
          </div>
        </div>
      </div>

    <div id="footer-placeholder"></div>
    <script>
      fetch("/footer.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("footer-placeholder").innerHTML = data;
          if (typeof carregarTraducoes === "function") {
            carregarTraducoes("pt", "footer.json");
            carregarTraducoes("pt", "cookies.json");
          }
        });

      // Nova Lógica de Filtros (Estilo Google)
      const buttons = document.querySelectorAll(".filter-btn");
      buttons.forEach((btn) => {
        btn.addEventListener("click", () => {
          // Remove active state de todos
          buttons.forEach((b) => {
            b.classList.remove("text-[#1A3E74]", "font-bold", "border-[#1A3E74]", "active");
            b.classList.add("text-gray-500", "font-medium", "border-transparent");
          });
          // Adiciona active no clicado
          btn.classList.remove("text-gray-500", "font-medium", "border-transparent");
          btn.classList.add("text-[#1A3E74]", "font-bold", "border-[#1A3E74]", "active");

          const filter = btn.getAttribute("data-filter");
          ["todos", "documentos", "fotos", "videos"].forEach((cat) => {
            const grid = document.getElementById(`grid-${cat}`);
            if (grid) grid.classList.toggle("hidden", cat !== filter);
          });
        });
      });

      // Lightbox Lógica
      let bibliotecaGlobal = [];
      let currentGlobalIndex = -1;

      fetch("/biblioteca.json")
        .then((res) => res.json())
        .then((data) => {
          bibliotecaGlobal = data;
        })
        .catch((err) => console.error("Erro ao carregar acervo.", err));

      function slugifyJs(text) {
        return String(text || "")
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/(^-|-$)/g, "");
      }

      function updateLightboxUI() {
        if (currentGlobalIndex === -1 || bibliotecaGlobal.length === 0) return;
        const item = bibliotecaGlobal[currentGlobalIndex];
        let imagePath = item.capa || item.ficheiro || "";
        if (imagePath && !imagePath.startsWith("/")) imagePath = "/" + imagePath;
        const title = item.titulo || "Arquivo sem título";
        const slug = item.slug || slugifyJs(title);
        const pageUrl = `/biblioteca/${slug}.html`;
        const desc = item.descricao && item.descricao.trim() !== "" ? item.descricao : `Download do material sobre ${title} na nossa Biblioteca.`;
        const categoria = String(item.categoria || item.tipo || "")
          .toLowerCase()
          .trim();
        const isVideo = categoria === "videos" || categoria === "vídeos" || imagePath.match(/\.(mp4|webm|mov)$/i);

        const img = document.getElementById("lightbox-img");
        const video = document.getElementById("lightbox-video");
        const playBtn = document.getElementById("lightbox-play-btn");

        img.src = imagePath;
        img.classList.remove("hidden");
        video.pause();
        video.src = "";
        video.classList.add("hidden");
        if (isVideo) playBtn.classList.remove("hidden");
        else playBtn.classList.add("hidden");

        document.getElementById("lightbox-title").textContent = title;
        document.getElementById("lightbox-download").href = imagePath;
        document.getElementById("lightbox-page-link").href = pageUrl;
        document.getElementById("lightbox-desc").textContent = desc;

        document.getElementById("lightbox-prev").classList.toggle("hidden", currentGlobalIndex <= 0);
        document.getElementById("lightbox-next").classList.toggle("hidden", currentGlobalIndex >= bibliotecaGlobal.length - 1);
      }

      document.getElementById("lightbox-play-btn").addEventListener("click", () => {
        if (currentGlobalIndex === -1 || bibliotecaGlobal.length === 0) return;
        let videoPath = bibliotecaGlobal[currentGlobalIndex].ficheiro || "";
        if (videoPath && !videoPath.startsWith("/")) videoPath = "/" + videoPath;
        document.getElementById("lightbox-img").classList.add("hidden");
        document.getElementById("lightbox-play-btn").classList.add("hidden");
        const video = document.getElementById("lightbox-video");
        video.src = videoPath;
        video.classList.remove("hidden");
        video.play();
      });

      document.body.addEventListener("click", (e) => {
        const card = e.target.closest(".file-card");
        if (!card || bibliotecaGlobal.length === 0) return;
        e.preventDefault();
        const slugFromCard = card.dataset.slug || card.getAttribute("href").split("/").pop().replace(".html", "");
        if (!slugFromCard) return;
        const foundIndex = bibliotecaGlobal.findIndex((item) => (item.slug || slugifyJs(item.titulo)) === slugFromCard);
        if (foundIndex === -1) return;

        currentGlobalIndex = foundIndex;
        updateLightboxUI();
        const lightbox = document.getElementById("global-lightbox");
        lightbox.classList.remove("hidden");
        document.body.style.overflow = "hidden";
        setTimeout(() => {
          lightbox.classList.remove("opacity-0");
          lightbox.classList.add("opacity-100");
        }, 10);
      });

      document.getElementById("lightbox-prev").addEventListener("click", (e) => {
        e.stopPropagation();
        if (currentGlobalIndex > 0) {
          currentGlobalIndex--;
          updateLightboxUI();
        }
      });
      document.getElementById("lightbox-next").addEventListener("click", (e) => {
        e.stopPropagation();
        if (currentGlobalIndex < bibliotecaGlobal.length - 1) {
          currentGlobalIndex++;
          updateLightboxUI();
        }
      });

      function fecharLightbox() {
        const lightbox = document.getElementById("global-lightbox");
        document.getElementById("lightbox-video").pause();
        lightbox.classList.remove("opacity-100");
        lightbox.classList.add("opacity-0");
        setTimeout(() => {
          lightbox.classList.add("hidden");
          document.body.style.overflow = "";
          document.getElementById("lightbox-img").src = "";
        }, 300);
      }

      document.addEventListener("keydown", (e) => {
        if (!document.getElementById("global-lightbox").classList.contains("hidden")) {
          if (e.key === "Escape") fecharLightbox();
          else if (e.key === "ArrowLeft" && currentGlobalIndex > 0) {
            currentGlobalIndex--;
            updateLightboxUI();
          } else if (e.key === "ArrowRight" && currentGlobalIndex < bibliotecaGlobal.length - 1) {
            currentGlobalIndex++;
            updateLightboxUI();
          }
        }
      });
    </script>
