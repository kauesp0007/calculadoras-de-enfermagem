  <div id="footer-placeholder"></div>

  <script src="/global-scripts.js"></script>
  

  <script>
    // Carrega o rodapé modularizado. O / antes de footer garante que o caminho aponte para a raiz,
    // essencial já que estes ficheiros ficarão alojados dentro da pasta /biblioteca/
    fetch("/footer.html")
      .then(response => response.text())
      .then(data => {
        const placeholder = document.getElementById("footer-placeholder");
        if (placeholder) placeholder.innerHTML = data;
      })
      .catch(err => console.error('Erro ao carregar o rodapé:', err));
  </script>
