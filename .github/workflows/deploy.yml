name: 🚀 Deploy automático no GitHub Pages

on:
  push:
    branches:
      - main   # sempre que você der push na branch main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4

      - name: ⚙️ Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload dos arquivos
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./

      - name: 🚀 Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: ⏳ Aguardar antes de tentar novamente
        if: steps.deployment.outcome == 'failure'
        run: sleep 20

      - name: 🔄 Retry do Deploy no GitHub Pages
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: ❌ Falha após todas as tentativas
        if: steps.deployment.outcome == 'failure' && failure()
        run: |
          echo "::error::O deploy falhou em ambas as tentativas. Verifique os logs acima para mais detalhes."
          exit 1
