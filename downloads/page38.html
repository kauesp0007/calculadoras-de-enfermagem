    <script src="/global-scripts.js"></script>

    <script>
        fetch("/footer.html")
            .then((response) => response.text())
            .then((data) => {
                document.getElementById("footer-placeholder").innerHTML = data;
            });

        // Lógica dos Botões de Filtro
        const buttons = document.querySelectorAll('.filter-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => {
                    b.classList.remove('bg-[#1A3E74]', 'text-white');
                    b.classList.add('bg-gray-100', 'text-gray-600');
                });

                btn.classList.remove('bg-gray-100', 'text-gray-600');
                btn.classList.add('bg-[#1A3E74]', 'text-white');

                const filter = btn.getAttribute('data-filter');
                ['todos', 'documentos', 'fotos', 'videos'].forEach(cat => {
                    const grid = document.getElementById(`grid-${cat}`);
                    if (grid) {
                        grid.classList.toggle('hidden', cat !== filter);
                    }
                });
            });
        });

        // Lógica de Navegação Infinita do Lightbox (Buscando o acervo completo)
        let bibliotecaGlobal = [];
        let currentGlobalIndex = -1;

        // Carrega o JSON da biblioteca de forma silenciosa para navegação ilimitada
        fetch('/biblioteca.json')
            .then(res => res.json())
            .then(data => {
                bibliotecaGlobal = data;
            })
            .catch(err => console.error("Erro ao carregar acervo.", err));

        function slugifyJs(text) {
            return String(text || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
        }

        function updateLightboxUI() {
            if (currentGlobalIndex === -1 || bibliotecaGlobal.length === 0) return;

            const item = bibliotecaGlobal[currentGlobalIndex];

            let imagePath = item.capa || item.ficheiro || "";
            if (imagePath && !imagePath.startsWith("/")) imagePath = "/" + imagePath;

            const title = item.titulo || 'Arquivo sem título';
            const slug = item.slug || slugifyJs(title);
            const pageUrl = `/biblioteca/${slug}.html`;
            const desc = item.descricao && item.descricao.trim() !== "" ? item.descricao : `Faça o download do material completo sobre ${title} na nossa Biblioteca de Enfermagem.`;

            document.getElementById('lightbox-img').src = imagePath;
            document.getElementById('lightbox-title').textContent = title;
            document.getElementById('lightbox-download').href = imagePath;
            document.getElementById('lightbox-page-link').href = pageUrl;
            document.getElementById('lightbox-desc').textContent = desc;

            // Atualiza visibilidade das Setas para navegação ilimitada
            const prevBtn = document.getElementById('lightbox-prev');
            const nextBtn = document.getElementById('lightbox-next');

            if (currentGlobalIndex > 0) prevBtn.classList.remove('hidden');
            else prevBtn.classList.add('hidden');

            if (currentGlobalIndex < bibliotecaGlobal.length - 1) nextBtn.classList.remove('hidden');
            else nextBtn.classList.add('hidden');
        }

        // Abre o Lightbox encontrando o item correspondente no JSON Global
        document.body.addEventListener('click', (e) => {
            const card = e.target.closest('.file-card');
            if (card) {
                e.preventDefault();

                if (bibliotecaGlobal.length === 0) return; // Aguarda carregamento JSON

                const titleElement = card.querySelector('figcaption');
                if (!titleElement) return;

                const cardTitle = titleElement.textContent.trim();
                const foundIndex = bibliotecaGlobal.findIndex(i => i.titulo === cardTitle);

                if (foundIndex !== -1) {
                    currentGlobalIndex = foundIndex;
                    updateLightboxUI();

                    const lightbox = document.getElementById('global-lightbox');
                    lightbox.classList.remove('hidden');
                    document.body.style.overflow = "hidden"; // Desativa scroll da página de trás

                    setTimeout(() => {
                        lightbox.classList.remove('opacity-0');
                        lightbox.classList.add('opacity-100');
                    }, 10);
                }
            }
        });

        // Ações das Setas de Navegação (Avanço Ilimitado)
        document.getElementById('lightbox-prev').addEventListener('click', (e) => {
            e.stopPropagation();
            if (currentGlobalIndex > 0) {
                currentGlobalIndex--;
                updateLightboxUI();
            }
        });

        document.getElementById('lightbox-next').addEventListener('click', (e) => {
            e.stopPropagation();
            if (currentGlobalIndex < bibliotecaGlobal.length - 1) {
                currentGlobalIndex++;
                updateLightboxUI();
            }
        });

        function fecharLightbox() {
            const lightbox = document.getElementById('global-lightbox');
            lightbox.classList.remove('opacity-100');
            lightbox.classList.add('opacity-0');

            setTimeout(() => {
                lightbox.classList.add('hidden');
                document.body.style.overflow = ""; // Restaura o scroll normal da página
                document.getElementById('lightbox-img').src = "";
            }, 300);
        }

        document.addEventListener('keydown', (e) => {
            const lightbox = document.getElementById('global-lightbox');
            if (!lightbox.classList.contains('hidden')) {
                if (e.key === "Escape") fecharLightbox();
                else if (e.key === "ArrowLeft" && currentGlobalIndex > 0) {
                    currentGlobalIndex--;
                    updateLightboxUI();
                } else if (e.key === "ArrowRight" && currentGlobalIndex < bibliotecaGlobal.length - 1) {
                    currentGlobalIndex++;
                    updateLightboxUI();
                }
            }
        });

    </script>
