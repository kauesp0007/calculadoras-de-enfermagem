                    <a id="lightbox-download" href="#" download class="flex items-center justify-center w-10 h-10 bg-blue-500/80 hover:bg-blue-600 border border-blue-400/50 rounded-lg text-white transition-all shadow-lg backdrop-blur-sm" title="Fazer Download">
                        <i class="fa-solid fa-cloud-arrow-down text-lg"></i>
                    </a>
                    <button onclick="fecharLightbox()" class="flex items-center justify-center w-10 h-10 bg-red-500/80 hover:bg-red-600 border border-red-400/50 rounded-lg text-white transition-all shadow-lg backdrop-blur-sm" title="Fechar">
                        <i class="fa-solid fa-xmark text-lg"></i>
                    </button>
                </div>
            </div>

            <!-- Área da Imagem com Rolagem (Scroll) -->
            <div class="flex-1 overflow-y-auto p-4 custom-scrollbar flex justify-center items-start">
                <img id="lightbox-img" class="w-full max-w-4xl h-auto object-contain rounded-lg shadow-lg" src="" alt="">
            </div>

            <!-- Rodapé Modal -->
            <div class="p-4 bg-black/30 border-t border-white/10 flex flex-col items-center shrink-0 mt-auto">
                <p id="lightbox-desc" class="text-gray-200 text-sm md:text-base text-center mb-4 hidden font-medium drop-shadow-sm max-w-3xl"></p>
                <div class="flex flex-wrap justify-center gap-4">
                    <a id="lightbox-page-link" href="#" class="bg-[#4A90E2]/90 hover:bg-[#357ABD] text-white font-bold py-2 px-6 md:px-8 rounded-xl shadow-lg transition-transform hover:scale-105 backdrop-blur-sm border border-blue-300/30 flex items-center gap-2">
                        <i class="fa-regular fa-file-lines"></i> Ver Detalhes do Arquivo
                    </a>
                </div>
            </div>
        </div>
    </div>


    <script src="/global-scripts.js"></script>
    <div id="footer-placeholder"></div>

        <script>
        fetch("/footer.html")
            .then((response) => response.text())
            .then((data) => {
                document.getElementById("footer-placeholder").innerHTML = data;
            });

        // Lógica dos Botões de Filtro
        const buttons = document.querySelectorAll('.filter-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => {
                    b.classList.remove('bg-[#1A3E74]', 'text-white');
                    b.classList.add('bg-gray-100', 'text-gray-600');
                });

                btn.classList.remove('bg-gray-100', 'text-gray-600');
                btn.classList.add('bg-[#1A3E74]', 'text-white');

                const filter = btn.getAttribute('data-filter');
                ['todos', 'documentos', 'fotos', 'videos'].forEach(cat => {
                    const grid = document.getElementById(`grid-${cat}`);
                    if (grid) {
                        grid.classList.toggle('hidden', cat !== filter);
                    }
                });
            });
        });

        // Lógica Atualizada do Lightbox
        document.querySelectorAll('.file-card').forEach(item => {
            item.addEventListener('click', (e) => {
                const card = e.target.closest('.file-card');
                if (card) {
                    e.preventDefault();

                    const imgSrc = card.querySelector('img').src;
                    const title = card.querySelector('figcaption') ? card.querySelector('figcaption').textContent : 'Arquivo sem título';
                    const pageUrl = card.href;

                    const descElement = card.querySelector('.item-description-hidden');
                    const desc = descElement ? descElement.textContent : '';

                    document.getElementById('lightbox-img').src = imgSrc;
                    document.getElementById('lightbox-title').textContent = title;
                    document.getElementById('lightbox-download').href = imgSrc;
                    document.getElementById('lightbox-page-link').href = pageUrl;

                    const descContainer = document.getElementById('lightbox-desc');
                    if (desc && desc.trim() !== "") {
                        descContainer.textContent = desc;
                        descContainer.classList.remove('hidden');
                    } else {
                        descContainer.classList.add('hidden');
                    }

                    const lightbox = document.getElementById('global-lightbox');
                    lightbox.classList.remove('hidden');
                    document.body.style.overflow = "hidden";

                    setTimeout(() => {
                        lightbox.classList.remove('opacity-0');
                        lightbox.classList.add('opacity-100');
                    }, 10);
                }
            });
        });

        function fecharLightbox() {
            const lightbox = document.getElementById('global-lightbox');
            lightbox.classList.remove('opacity-100');
            lightbox.classList.add('opacity-0');

            setTimeout(() => {
                lightbox.classList.add('hidden');
                document.body.style.overflow = "";
                document.getElementById('lightbox-img').src = "";
                document.getElementById('lightbox-desc').textContent = "";
            }, 300);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") fecharLightbox();
        });
    </script>
</body>
</html>
