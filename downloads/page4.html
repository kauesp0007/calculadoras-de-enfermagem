    <!-- Modal / Lightbox com Estilo Vidro (Glassmorphism) e Rolagem -->
    <div id="global-lightbox" class="fixed inset-0 z-[9999] hidden opacity-0 transition-opacity duration-300 bg-[#0f172a]/95 backdrop-blur-md overflow-y-auto">

        <!-- Botão Fechar X (Sempre visível no topo direito) -->
        <button id="lightbox-close" onclick="fecharLightbox()" class="fixed top-4 right-4 md:top-6 md:right-6 z-[10000] flex items-center justify-center w-12 h-12 bg-red-500/80 hover:bg-red-600 border border-white/30 rounded-full text-white transition-all shadow-xl backdrop-blur-sm cursor-pointer" title="Fechar">
            <i class="fa-solid fa-xmark text-2xl"></i>
        </button>

        <!-- Seta Anterior -->
        <button id="lightbox-prev" class="fixed left-2 md:left-6 top-1/2 transform -translate-y-1/2 z-[10000] flex items-center justify-center w-12 h-12 md:w-16 md:h-16 bg-black/50 hover:bg-black/80 border border-white/30 rounded-full text-white shadow-[0_0_15px_rgba(0,0,0,0.5)] backdrop-blur-md transition-all hidden cursor-pointer" title="Anterior">
            <i class="fa-solid fa-chevron-left text-2xl md:text-3xl"></i>
        </button>

        <!-- Seta Próxima -->
        <button id="lightbox-next" class="fixed right-2 md:right-6 top-1/2 transform -translate-y-1/2 z-[10000] flex items-center justify-center w-12 h-12 md:w-16 md:h-16 bg-black/50 hover:bg-black/80 border border-white/30 rounded-full text-white shadow-[0_0_15px_rgba(0,0,0,0.5)] backdrop-blur-md transition-all hidden cursor-pointer" title="Próximo">
            <i class="fa-solid fa-chevron-right text-2xl md:text-3xl"></i>

                <!-- Imagem Reduzida (Lado Esquerdo) -->
                <div class="w-full md:w-1/2 bg-gray-100 flex items-center justify-center p-4 border-r border-gray-200">
                    <img id="lightbox-img" class="max-w-full h-auto max-h-[70vh] object-contain rounded-lg shadow-sm" src="" alt="">
                </div>

                <!-- Detalhes do Arquivo (Lado Direito) -->
                <div class="w-full md:w-1/2 p-6 md:p-10 flex flex-col justify-center bg-white">
                    <h3 id="lightbox-title" class="text-2xl md:text-3xl font-black text-[#1A3E74] mb-4"></h3>

                        </a>

    <div id="footer-placeholder"></div>

    <script src="/global-scripts.js"></script>

    <script>
        fetch("/footer.html")
            .then((response) => response.text())
            .then((data) => {
                document.getElementById("footer-placeholder").innerHTML = data;
            });

        // Lógica dos Botões de Filtro
        const buttons = document.querySelectorAll('.filter-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => {
                    b.classList.remove('bg-[#1A3E74]', 'text-white');
                    b.classList.add('bg-gray-100', 'text-gray-600');
                });

                btn.classList.remove('bg-gray-100', 'text-gray-600');
                btn.classList.add('bg-[#1A3E74]', 'text-white');

                const filter = btn.getAttribute('data-filter');
                ['todos', 'documentos', 'fotos', 'videos'].forEach(cat => {
                    const grid = document.getElementById(`grid-${cat}`);
                    if (grid) {
                        grid.classList.toggle('hidden', cat !== filter);
                    }
                });
            });
        });

        // Lógica de Navegação do Lightbox Otimizada
        let currentCardsArray = [];
        let currentCardIndex = -1;

        function updateLightboxUI() {
            if (currentCardIndex === -1 || currentCardsArray.length === 0) return;

            const card = currentCardsArray[currentCardIndex];
            const imgSrc = card.querySelector('img').src;
            const title = card.querySelector('figcaption') ? card.querySelector('figcaption').textContent : 'Arquivo sem título';
            const pageUrl = card.href;
            const descElement = card.querySelector('.item-description-hidden');
            const desc = descElement ? descElement.textContent : '';

            document.getElementById('lightbox-img').src = imgSrc;
            document.getElementById('lightbox-title').textContent = title;
            document.getElementById('lightbox-download').href = imgSrc;
            document.getElementById('lightbox-page-link').href = pageUrl;

            const descContainer = document.getElementById('lightbox-desc');
            descContainer.textContent = desc && desc.trim() !== "" ? desc : "Faça o download do material completo na nossa Biblioteca de Enfermagem.";

            // Atualiza visibilidade das Setas
            const prevBtn = document.getElementById('lightbox-prev');
            const nextBtn = document.getElementById('lightbox-next');

            if (currentCardIndex > 0) prevBtn.classList.remove('hidden');
            else prevBtn.classList.add('hidden');

            if (currentCardIndex < currentCardsArray.length - 1) nextBtn.classList.remove('hidden');
            else nextBtn.classList.add('hidden');
        }

        // Abre o Lightbox de forma delegada
        document.body.addEventListener('click', (e) => {
            const card = e.target.closest('.file-card');
            if (card) {
                e.preventDefault();

                // Encontra a grade atual visível para garantir que as setas pulem apenas para itens reais
                const visibleGrid = Array.from(document.querySelectorAll('[id^="grid-"]')).find(grid => !grid.classList.contains('hidden'));

                if(visibleGrid) {
                     currentCardsArray = Array.from(visibleGrid.querySelectorAll('.file-card'));
                     currentCardIndex = currentCardsArray.indexOf(card);

                     updateLightboxUI();

                     const lightbox = document.getElementById('global-lightbox');
                     lightbox.classList.remove('hidden');
                     document.body.style.overflow = "hidden"; // Desativa scroll do fundo e ativa do modal

                     setTimeout(() => {
                         lightbox.classList.remove('opacity-0');
                         lightbox.classList.add('opacity-100');
                     }, 10);
                }
            }
        });

        // Eventos das Setas de Navegação (Avança/Volta imagens sem erro 404)
        document.getElementById('lightbox-prev').addEventListener('click', (e) => {
             e.stopPropagation();
             if (currentCardIndex > 0) {
                 currentCardIndex--;
                 updateLightboxUI();
             }
        });

        document.getElementById('lightbox-next').addEventListener('click', (e) => {
             e.stopPropagation();
             if (currentCardIndex < currentCardsArray.length - 1) {
                 currentCardIndex++;
                 updateLightboxUI();
             }
        });

        // Fechar Modal
        function fecharLightbox() {
            const lightbox = document.getElementById('global-lightbox');
            lightbox.classList.remove('opacity-100');
            lightbox.classList.add('opacity-0');

            setTimeout(() => {
                lightbox.classList.add('hidden');
                document.body.style.overflow = ""; // Restaura o scroll da página principal
                document.getElementById('lightbox-img').src = "";
            }, 300);
        }

        // Suporte a teclado (Esc para fechar, Setas para navegar)
        document.addEventListener('keydown', (e) => {
            const lightbox = document.getElementById('global-lightbox');
            if (!lightbox.classList.contains('hidden')) {
                if (e.key === "Escape") fecharLightbox();
                else if (e.key === "ArrowLeft" && currentCardIndex > 0) {
                    currentCardIndex--;
                    updateLightboxUI();
                } else if (e.key === "ArrowRight" && currentCardIndex < currentCardsArray.length - 1) {
                    currentCardIndex++;
                    updateLightboxUI();
                }
            }
        });
        
    </script>
