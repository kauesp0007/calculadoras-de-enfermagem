<script>
// Modular HTML loading function
function fetchHTML(url, containerId) {
fetch(url)
.then((response) => (response.ok ? response.text() : Promise.reject()))
.then((data) => {
const container = document.getElementById(containerId);
if (container) container.innerHTML = data;
if (typeof carregarTraducoes === 'function') {
var _l=(function(){var m=location.pathname.match(/^\/(en|es|de|it|fr|hi|zh|ar|ja|ru|ko|tr|nl|pl|sv|id|vi|uk)\//);return m?m[1]:'pt';})();
carregarTraducoes(_l, 'footer.json');
carregarTraducoes(_l, 'cookies.json');
}
});
.catch((error) => console.error(`Error loading ${url}:`, error));
}

document.addEventListener("DOMContentLoaded", function () {
// Load modules
fetchHTML("/en/menu-global.html", "global-header-container");
fetchHTML("/en/_language_selector.html", "language-dropdown-wrapper");
fetchHTML("/en/footer.html", "footer-placeholder");
fetchHTML("/en/global-body-elements.html", "global-body-elements-container");

const resultadoDiv = document.getElementById("resultado");
const conteudoDiv = document.getElementById("conteudo");
const btnCalcular = document.getElementById("btnCalcular");
const btnLimpar = document.getElementById("btnLimpar");

const fourData = [
{
category: "E - Eye Response",
nameAttr: "eyeResponse",
options: [
{
description: "4 - Eyelids open or opened, tracking, or blinking to command",
score: 4,
},
{
description: "3 - Eyelids open but not tracking",
score: 3,
},
{
description: "2 - Eyelids closed but open to loud voice",
score: 2,
},
{
description: "1 - Eyelids closed but open to pain",
score: 1,
},
{ description: "0 - Eyelids remain closed with pain", score: 0 },
],
},
{
category: "M - Motor Response",
nameAttr: "motorResponse",
options: [
{ description: "4 - Thumbs-up, fist, or peace sign", score: 4 },
{ description: "3 - Localizing to pain", score: 3 },
{ description: "2 - Flexion response to pain", score: 2 },
{ description: "1 - Extension response to pain", score: 1 },
{
description: "0 - No response to pain or generalized myoclonus status",
score: 0,
},
],
},
{
category: "B - Brainstem Reflexes",
nameAttr: "brainstemReflex",
options: [
{
description: "4 - Pupil and corneal reflexes present",
score: 4,
},
{ description: "3 - One pupil wide and fixed", score: 3 },
{ description: "2 - Pupil or corneal reflexes absent", score: 2 },
{
description: "1 - Pupil and corneal reflexes absent",
score: 1,
},
{
description:
"0 - Absent pupil, corneal, and cough reflex",
score: 0,
},
],
},
{
category: "R - Respiration",
nameAttr: "respiration",
options: [
{
description: "4 - Not intubated, regular breathing pattern",
score: 4,
},
{
description: "3 - Not intubated, Cheyne-Stokes breathing pattern",
score: 3,
},
{
description: "2 - Not intubated, irregular breathing",
score: 2,
},
{ description: "1 - Breathes above ventilator rate", score: 1 },
{
description: "0 - Breathes at ventilator rate or apnea",
score: 0,
},
],
},
];

function createForm() {
conteudoDiv.innerHTML = "";
fourData.forEach((criterion) => {
const card = document.createElement("div");
card.className = "criterion-card";
card.innerHTML = `
<h3 class="criterion-title">${criterion.category}</h3>
<div class="options-container">
<select id="${criterion.nameAttr}-select" class="custom-select" aria-label="Select option for ${criterion.category}">
<option value="" disabled selected>Select...</option>
${criterion.options.map((opt) => `<option value="${opt.score}">${opt.description}</option>`).join("")}
</select>
</div>
`;
conteudoDiv.appendChild(card);
});
}

function calcularPontuacao() {
let total = 0;
let allCategoriesSelected = true;

fourData.forEach((categoryData) => {
const select = document.getElementById(
`${categoryData.nameAttr}-select`,
);
if (select && select.value !== "") {
total += parseInt(select.value, 10);
} else {
allCategoriesSelected = false;
}
});

if (!allCategoriesSelected) {
resultadoDiv.innerHTML =
'⚠️ <strong class="font-bold">Please select an option for all categories.</strong>';
resultadoDiv.className = "resultado bg-info-orange-light";
resultadoDiv.style.display = "block";
delete resultadoDiv.dataset.score;
return;
}

let classificacao = "";
let resultClass = "";
let icon = "";

// Simplified interpretation usually correlates lower scores with higher mortality
if (total >= 13) {
classificacao = "Favorable prognosis / Mild impairment";
resultClass = "bg-four-good";
icon = '<i class="fas fa-check-circle text-green-600 text-2xl mr-2"></i>';
} else if (total >= 9) {
classificacao = "Moderate impairment";
resultClass = "bg-four-moderate";
icon = '<i class="fas fa-exclamation-triangle text-orange-600 text-2xl mr-2"></i>';
} else if (total >= 5) {
classificacao = "Severe impairment";
resultClass = "bg-four-severe";
icon = '<i class="fas fa-exclamation-circle text-red-600 text-2xl mr-2"></i>';
} else {
classificacao = "Very severe / High mortality risk";
resultClass = "bg-four-severe";
icon = '<i class="fas fa-exclamation-circle text-red-600 text-2xl mr-2"></i>';
}

resultadoDiv.innerHTML = `
<div class="flex items-center mb-2">
${icon}
<h3 class="text-xl font-bold">Result: ${total} / 16</h3>
</div>
<p class="text-lg font-medium">Interpretation: <strong class="font-bold">${classificacao}</strong></p>
`;
resultadoDiv.className = `resultado ${resultClass}`;
resultadoDiv.style.display = "block";

resultadoDiv.dataset.score = total;
resultadoDiv.dataset.scaleName = "FOUR Scale";
resultadoDiv.dataset.classificacao = classificacao;
}

function limparCampos() {
const selects = document.querySelectorAll("select");
selects.forEach(s => s.selectedIndex = 0);
resultadoDiv.innerHTML = "";
resultadoDiv.className = "hidden";
delete resultadoDiv.dataset.score;
delete resultadoDiv.dataset.classificacao;
delete resultadoDiv.dataset.scaleName;
}

createForm();
btnCalcular?.addEventListener("click", calcularPontuacao);
btnLimpar?.addEventListener("click", limparCampos);

});
</script>
