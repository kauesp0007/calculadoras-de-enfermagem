  <!-- Lógica Supabase (Comentários) -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const SUPABASE_URL = "https://asjkftjfbkuuhilnqonx.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzamtmdGpmYmt1dWhpbG5xb254Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwODMxNjQsImV4cCI6MjA4MjY1OTE2NH0.mly76L5r2zoasonwta8aNND2mWWrkAoXirAAs99mDYo";
      const page_path = window.location.pathname;

      async function initSupabase() {
        if (!window.supabase) {
          const s = document.createElement("script");
          s.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
          s.onload = startComments;
          document.body.appendChild(s);
        } else { startComments(); }
      }

      async function startComments() {
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const list = document.getElementById("comments-list");
        const form = document.getElementById("comments-form");

        async function load() {
          const { data } = await sb.from("page_comments").select("*").eq("page_path", page_path).eq("is_approved", true).order("created_at", {ascending: false});
          if (data) {
            list.innerHTML = data.map(c => `<div class="p-3 border-b"><strong>${c.name || 'Anónimo'}:</strong> <p class="text-sm">${c.comment}</p></div>`).join('');
          }
        }

        form.onsubmit = async (e) => {
          e.preventDefault();
          const name = document.getElementById("comment-name").value;
          const comment = document.getElementById("comment-text").value;
          await sb.from("page_comments").insert([{ page_path, name, comment, is_approved: true, lang: 'pt-br' }]);
          document.getElementById("comment-text").value = "";
          load();
        };
        load();
      }

      // Lazy load dos comentários
      const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) { initSupabase(); observer.disconnect(); }
      }, { rootMargin: "100px" });
      observer.observe(document.getElementById("page-comments"));
    });
  </script>
