<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- 1. Charset e Viewport -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 2. DNS e Preconnects -->
  <link rel="dns-prefetch" href="//googleads.g.doubleclick.net">
  <link rel="dns-prefetch" href="//pagead2.googlesyndication.com">
  <link rel="preconnect" href="https://www.googletagmanager.com">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin="">

  <!-- 3. Title e Metatags (SEO e Redes Sociais) -->
  <title>Painel Admin - Calculadoras de Enfermagem</title>

  <!-- 5. Preloads de Módulos HTML -->
  <link rel="preload" href="menu-global.html" as="fetch" crossorigin="">
  <link rel="preload" href="global-body-elements.html" as="fetch" crossorigin="">

  <!-- 6. CSS Adicional (Ícones e Fontes Extras) -->
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>

  <!-- 11. Outros Scripts/Tags -->
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    
    body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background-color: #f0f2f5;
    margin: 0;
    text-align: center;
    }
    .card {
    background: white;
    padding: 2rem;
    border-radius: 12px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    max-width: 90%;
    width: 400px;
    }
    h1 { color: #333; margin-bottom: 20px; font-size: 1.5rem; }
    .status {
    padding: 10px;
    margin-bottom: 20px;
    border-radius: 6px;
    font-weight: bold;
    transition: all 0.3s ease;
    }
    /* Classes controladas pelo JS */
    .status.on { background-color: #d1fae5; color: #065f46; border: 1px solid #34d399; }
    .status.off { background-color: #fee2e2; color: #991b1b; border: 1px solid #f87171; }
    
    button {
    width: 100%;
    padding: 15px;
    margin: 5px 0;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    font-weight: bold;
    transition: opacity 0.2s;
    }
    button:active { opacity: 0.8; }
    .btn-ativar { background-color: #10b981; color: white; }
    .btn-desativar { background-color: #ef4444; color: white; }
    .footer { margin-top: 20px; font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>
<style id="anti-cls-placeholders">
      #global-header-container{display:block;width:100%;min-height:96px;background-color:#fff}
      @media(max-width:768px){#global-header-container{min-height:60px}}
      #language-selector-placeholder{display:block;width:100%;min-height:48px;background-color:#f9fafb}
      #footer-placeholder{display:block;min-height:520px;background-color:#1a3e74}
      @media(min-width:768px){#footer-placeholder{min-height:277px}}
    </style>
<div class="card">
        <h1>Painel de Controle 🛡️</h1>
        <p>Status atual do Modo Admin:</p>

        <div id="status-display" class="status off">Verificando...</div>

        <button onclick="ativarAdmin()" class="btn-ativar">ATIVAR MODO ADMIN (Bloquear Ads)</button>
        <button onclick="desativarAdmin()" class="btn-desativar">DESATIVAR (Voltar ao normal)</button>

        <div class="footer">
            <p>Ative isso em todos os seus dispositivos (PC e Celular) para não gerar tráfego inválido no AdSense.</p>
            <a href="/" style="color:#2563eb; text-decoration: none;">Ir para a Home</a>
        </div>
    </div>

    <script>
        // 1. Função que roda ao carregar a página para mostrar o status real
        function verificarStatus() {
            const statusDiv = document.getElementById('status-display');
            // Verifica se existe o item no LocalStorage
            const isAdmin = localStorage.getItem('admin_mode') === 'true';

            if (isAdmin) {
                statusDiv.innerText = "ATIVADO (Você está invisível)";
                statusDiv.className = "status on";
            } else {
                statusDiv.innerText = "DESATIVADO (Rastreamento Normal)";
                statusDiv.className = "status off";
            }
        }

        // 2. Função para o botão ATIVAR
        function ativarAdmin() {
            localStorage.setItem('admin_mode', 'true');
            verificarStatus(); // Atualiza a cor na hora
            alert("Modo Admin ATIVADO!\n\nAgora o Analytics e Adsense não carregarão para você neste navegador.");
        }

        // 3. Função para o botão DESATIVAR
        function desativarAdmin() {
            localStorage.removeItem('admin_mode');
            verificarStatus(); // Atualiza a cor na hora
            alert("Modo Admin DESATIVADO!\n\nVocê voltou a ser um usuário comum.");
        }

        // Roda a verificação assim que a página abre
        window.onload = verificarStatus;
    </script>

<div id="footer-placeholder"></div>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    setTimeout(() => {
      fetch("/footer.html")
        .then(response => response.text())
        .then((data) => {
          document.getElementById("footer-placeholder").innerHTML = data;
          carregarTraducoes('pt', 'footer.json');
          carregarTraducoes('pt', 'cookies.json');
        });
    }, 150);
  });
</script>
</body>
</html>
