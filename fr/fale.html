        if (footerPlaceholder) {
          footerPlaceholder.innerHTML = data;
        } else {
          console.error("Élément 'footer-placeholder' non trouvé.");
        }
      })
      .catch((error) =>
        console.error("Erreur lors du chargement du pied de page:", error),
      );
  </script>
